name: Publish Hashnode Posts

on:
  push:
    branches:
      - main      # Run action whenever you push to main branch
    paths:
      - 'names.txt'
      - 'personality.txt'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Publish to Hashnode
      env:
        HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
        PUBLICATION_ID: 69bfe39f4a1e513e41d1cf99
      run: |
        python scripts/publish_to_hashnode.py
